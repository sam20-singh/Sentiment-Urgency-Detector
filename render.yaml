services:
  - type: web
    name: sentinel-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # You'll set this manually in the Render dashboard
      - key: DISCORD_WEBHOOK_URL
        sync: false  # You'll set this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
